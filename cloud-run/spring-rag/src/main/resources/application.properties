spring.application.name=portfolio-rag
server.port=${PORT:8080}

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small
portfolio.chat.model=${CHAT_MODEL:gpt-4o-mini}

portfolio.knowledge-url=${KNOWLEDGE_URL:https://nnyouung.github.io/portfolio-knowledge.json}
portfolio.velog-rss-url=${VELOG_RSS_URL:https://v2.velog.io/rss/@nnyouung}

portfolio.auth-token=${BACKEND_AUTH_TOKEN:}

# Slack
portfolio.slack.webhook-url=${SLACK_WEBHOOK_URL:}

# Qdrant
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY:}
spring.ai.vectorstore.qdrant.collection-name=portfolio
spring.ai.vectorstore.qdrant.use-tls=${QDRANT_TLS:true}
spring.ai.vectorstore.qdrant.initialize-schema=true

portfolio.force-reindex=${FORCE_REINDEX:false}

logging.level.com.example.portfoliorag=INFO
